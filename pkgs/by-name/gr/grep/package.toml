format_version = 1
name = "grep"
version = "3.11"
architecture = "AMD64"
description = "GNU grep - print lines matching a pattern"
license = "GPL-3.0-or-later"
depends = ["glibc"]

[source]
url = "https://ftp.gnu.org/gnu/grep/grep-3.11.tar.xz"
sha256 = "1db2aedde89d0dea42b16d9528f894c8d15dae4e190b59aecc78f5a951276eab"

[phases]
configure = '''
_SYSROOT="/tmp/meow-install"
export CC="gcc --sysroot=$_SYSROOT"
export CFLAGS="-O2"

mkdir -p "${build}"
cd "${build}"
"${src}/configure" \
    --prefix=/usr \
    --host=x86_64-pc-linux-gnu \
    --disable-perl-regexp \
    --disable-nls
'''

build = '''
_SYSROOT="/tmp/meow-install"
export CC="gcc --sysroot=$_SYSROOT"
export CFLAGS="-O2"

cd "${build}"
make -j"${MEOW_JOBS}"
'''

install = '''
cd "${build}"
make DESTDIR="${out}" install

shopt -s nullglob
for _f in "${out}/usr/bin/"*; do
  if file "$_f" 2>/dev/null | grep -q "ELF.*executable"; then
    patchelf --set-interpreter /lib64/ld-linux-x86-64.so.2 \
             --set-rpath /usr/lib:/usr/lib64 "$_f"
  fi
done

rm -f "${out}/usr/share/info/dir"
'''
