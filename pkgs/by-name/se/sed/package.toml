format_version = 1
name = "sed"
version = "4.9"
architecture = "AMD64"
description = "GNU sed - stream editor"
license = "GPL-3.0-or-later"
depends = ["glibc"]

[source]
url = "https://ftp.gnu.org/gnu/sed/sed-4.9.tar.xz"
sha256 = "6e226b732e1cd739464ad6862bd1a1aba42d7982922da7a53519631d24975181"

[phases]
configure = '''
_SYSROOT="/tmp/meow-install"
export CC="gcc --sysroot=$_SYSROOT"
export CFLAGS="-O2"

mkdir -p "${build}"
cd "${build}"
"${src}/configure" \
    --prefix=/usr \
    --host=x86_64-pc-linux-gnu \
    --disable-nls \
    --disable-acl
'''

build = '''
_SYSROOT="/tmp/meow-install"
export CC="gcc --sysroot=$_SYSROOT"
export CFLAGS="-O2"

cd "${build}"
make -j"${MEOW_JOBS}"
'''

install = '''
cd "${build}"
make DESTDIR="${out}" install

shopt -s nullglob
for _f in "${out}/usr/bin/"*; do
  if file "$_f" 2>/dev/null | grep -q "ELF.*executable"; then
    patchelf --set-interpreter /lib64/ld-linux-x86-64.so.2 \
             --set-rpath /usr/lib:/usr/lib64 "$_f"
  fi
done

rm -f "${out}/usr/share/info/dir"
'''
