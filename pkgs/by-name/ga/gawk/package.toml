format_version = 1
name = "gawk"
version = "5.3.0"
architecture = "AMD64"
description = "GNU awk - pattern scanning and processing language"
license = "GPL-3.0-or-later"
depends = ["glibc"]

[source]
url = "https://ftp.gnu.org/gnu/gawk/gawk-5.3.0.tar.xz"
sha256 = "ca9c16d3d11d0ff8c69d79dc0b47267e1329a69b39b799895604ed447d3ca90b"

[phases]
configure = '''
_SYSROOT="/tmp/meow-install"
export CC="gcc --sysroot=$_SYSROOT"
export CFLAGS="-O2 -Wno-error=incompatible-pointer-types"

mkdir -p "${build}"
cd "${build}"
"${src}/configure" \
    --prefix=/usr \
    --host=x86_64-pc-linux-gnu \
    --disable-readline \
    --disable-mpfr \
    --disable-nls
'''

build = '''
_SYSROOT="/tmp/meow-install"
export CC="gcc --sysroot=$_SYSROOT"
export CFLAGS="-O2 -Wno-error=incompatible-pointer-types"

cd "${build}"
make -j"${MEOW_JOBS}"
'''

install = '''
cd "${build}"
make DESTDIR="${out}" install

shopt -s nullglob
for _f in "${out}/usr/bin/"*; do
  if file "$_f" 2>/dev/null | grep -q "ELF.*executable"; then
    patchelf --set-interpreter /lib64/ld-linux-x86-64.so.2 \
             --set-rpath /usr/lib:/usr/lib64 "$_f"
  fi
done

rm -f "${out}/usr/share/info/dir"
'''
