format_version = 1
name = "pkgconf"
version = "2.4.2"
architecture = "AMD64"
description = "Package compiler and linker metadata toolkit"
license = "ISC"
depends = ["glibc"]

[source]
url = "https://distfiles.ariadne.space/pkgconf/pkgconf-2.4.2.tar.xz"
sha256 = "0c211914337e2a39b7d2ee3c86eab3824d9d5c82ac9e33b8bcead7616d9d4c0d"

[phases]
configure = '''
_SYSROOT="/tmp/meow-install"
export CC="gcc --sysroot=$_SYSROOT"
export CFLAGS="-O2"

mkdir -p "${build}"
cd "${build}"
"${src}/configure" \
    --prefix=/usr \
    --host=x86_64-pc-linux-gnu
'''

build = '''
_SYSROOT="/tmp/meow-install"
export CC="gcc --sysroot=$_SYSROOT"
export CFLAGS="-O2"

cd "${build}"
make -j"${MEOW_JOBS}"
'''

install = '''
cd "${build}"
make DESTDIR="${out}" install

shopt -s nullglob
for _f in "${out}/usr/bin/"*; do
  if file "$_f" 2>/dev/null | grep -q "ELF.*executable"; then
    patchelf --set-interpreter /lib64/ld-linux-x86-64.so.2 \
             --set-rpath /usr/lib:/usr/lib64 "$_f"
  fi
done

rm -f "${out}/usr/share/info/dir"
'''
