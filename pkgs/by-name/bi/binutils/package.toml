format_version = 1
name = "binutils"
version = "2.46.1"
architecture = "AMD64"
description = "GNU binary utilities (assembler, linker, etc.)"
license = "GPL-3.0-or-later"
depends = []

[source]
url = "https://ftp.gnu.org/gnu/binutils/binutils-2.46.1.tar.xz"
sha256 = "e127a709cba24c76de8936cb7083dd768f28cd37eb010492e2f19b71eb1294e4"

[phases]
configure = '''
mkdir -p "${build}"
cd "${build}"
"${src}/configure" \
    --prefix=/usr \
    --target=x86_64-pc-linux-gnu \
    --disable-werror \
    --disable-nls \
    --enable-gprofng=no \
    --enable-new-dtags \
    --enable-default-hash-style=gnu \
    --with-system-zlib
'''
build = '''
cd "${build}"
make -j"${MEOW_JOBS}"
'''
check = '''
cd "${build}"
make check -j"${MEOW_JOBS}" 2>&1 | tail -50
'''
install = '''
cd "${build}"
make DESTDIR="${out}" install
# Remove unneeded files
rm -f "${out}/usr/share/info/dir"
rm -rf "${out}/usr/share/man/man1/ld.1" "${out}/usr/share/man/man1/ld.bfd.1"
'''

[build.environment]
requires = ["gcc", "make", "zlib", "texinfo"]

[package]
bootstrapStage = 1
