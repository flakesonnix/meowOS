format_version = 1
name = "gcc-stage1"
version = "15.2.0"
architecture = "AMD64"
description = "GNU C compiler (stage1, C only, bootstrap)"
license = "GPL-3.0-or-later WITH GCC-exception-3.1"
depends = ["binutils"]

[source]
url = "https://ftp.gnu.org/gnu/gcc/gcc-15.2.0/gcc-15.2.0.tar.xz"
sha256 = "438fd996826b0c82485a29da03a72d71d6e3541a83ec702df4271f6fe025d24e"

[phases]
configure = '''
_meow_incpath=""; _meow_libpath=""
for _d in /nix/store/*-gmp-*-dev/include; do [ -d "$_d" ] && _meow_incpath="$_d:$_meow_incpath" && break; done
for _d in /nix/store/*-isl-*-dev/include; do [ -d "$_d" ] && _meow_incpath="$_d:$_meow_incpath" && break; done
[ -n "$_meow_incpath" ] && export C_INCLUDE_PATH="$_meow_incpath" && export CPLUS_INCLUDE_PATH="$_meow_incpath"

cd "${src}"
for _meow_url in \
  "https://ftp.gnu.org/gnu/gmp/gmp-6.3.0.tar.xz" \
  "https://www.mpfr.org/mpfr-4.2.1/mpfr-4.2.1.tar.xz" \
  "https://ftp.gnu.org/gnu/mpc/mpc-1.3.1.tar.gz" \
  "https://libisl.sourceforge.io/isl-0.27.tar.xz"; do
  _meow_tar=$(basename "$_meow_url")
  if [ ! -f "$_meow_tar" ]; then
    curl -sL "$_meow_url" -o "$_meow_tar" || true
  fi
  if [ -f "$_meow_tar" ]; then
    _meow_dir=$(tar -tf "$_meow_tar" 2>/dev/null | { IFS=/ read -r _meow_first _meow_rest; echo "$_meow_first"; }) || true
    if [ -n "$_meow_dir" ] && [ ! -d "$_meow_dir" ]; then
      tar -xf "$_meow_tar" 2>/dev/null || true
      ln -sf "$_meow_dir" "${_meow_dir%%-*}" 2>/dev/null || true
    fi
  fi
done

mkdir -p "${build}"
cd "${build}"
"${src}/configure" \
    --prefix=/usr \
    --target=x86_64-pc-linux-gnu \
    --enable-languages=c \
    --disable-bootstrap \
    --disable-libstdcxx \
    --disable-libada \
    --disable-libfortran \
    --disable-libgo \
    --disable-libobjc \
    --disable-libphobos \
    --disable-libgomp \
    --disable-libatomic \
    --disable-libquadmath \
    --disable-libssp \
    --disable-libsanitizer \
    --disable-libvtv \
    --disable-plugin \
    --disable-nls \
    --disable-werror \
    --enable-default-hash-style=gnu \
    --disable-multilib \
    --disable-fixincludes
'''

build = '''
for _d in /nix/store/*-zlib-*/lib/libz.so; do [ -f "$_d" ] && export LIBRARY_PATH="${_d%/lib/libz.so}/lib" && break; done
for _d in /nix/store/*-gmp-*-dev/include; do [ -d "$_d" ] && export C_INCLUDE_PATH="$_d" && export CPLUS_INCLUDE_PATH="$_d" && break; done

cd "${build}"
make -j"${MEOW_JOBS}" all-gcc
'''

check = '''
cd "${build}"
make -j"${MEOW_JOBS}" -s check-gcc 2>&1 | tail -20 || true
'''

install = '''
cd "${build}"
make DESTDIR="${out}" install-gcc
rm -f "${out}/usr/share/info/dir"
'''

[build.environment]
requires = ["gcc", "make", "gmp", "mpfr", "libmpc", "zlib", "flex"]

[package]
bootstrapStage = 1
