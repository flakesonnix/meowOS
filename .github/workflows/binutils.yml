name: binutils

on:
  push:
    branches: [main]
    paths:
      - 'pkgs/by-name/bi/binutils/**'
      - 'build/**'
      - 'CMakeLists.txt'
      - 'flake.nix'
      - '.github/workflows/binutils.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pkgs/by-name/bi/binutils/**'
      - 'build/**'
      - 'CMakeLists.txt'
      - 'flake.nix'
      - '.github/workflows/binutils.yml'

jobs:
  build-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Cache build directory
        uses: actions/cache@v4
        with:
          path: build
          key: meow-build-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', 'meow/src/**/*', 'flake.nix') }}
          restore-keys: |
            meow-build-${{ runner.os }}-

      - name: Build meow tool
        run: nix develop --command bash -c 'cmake -B build -DCMAKE_BUILD_TYPE=Release && cmake --build build -j"$(nproc)"'

      - name: Build binutils
        run: nix develop --command bash -c 'bash build/build-package.sh pkgs/by-name/bi/binutils/'

      - uses: actions/upload-artifact@v4
        with:
          name: binutils-2.46.1
          path: /tmp/meow-pkg-out/binutils-*.pkg.tar.zst
