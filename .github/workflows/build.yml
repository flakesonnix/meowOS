name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update -qq
      - run: sudo apt-get install -y cmake libarchive-dev libsqlite3-dev
      - run: cmake -B build
      - run: cmake --build build
